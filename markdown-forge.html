<!DOCTYPE html>
<html>

<head>
    <title>Markdown Forge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="content">

        <h1>Markdown Forge</h1>

        <p>
            Paste Markdown below and get instant document stats.
        </p>

        <textarea id="markdown-input" placeholder="Paste your Markdown here..."></textarea>

        <br>

        <button id="analyze-markdown-btn">
            Analyze Markdown
        </button>

        <div class="project-card" id="markdown-results">

    <h2>⚒️ Markdown Forge Report</h2>

    <div class="score-card">

        <h1 id="health-score">0</h1>

        <h3>AI Readiness</h3>

        <p id="ai-readiness">
            Analyze your markdown to begin.
        </p>

    </div>

    <hr>

    <h3>Strengths</h3>

    <ul id="strengths-list">
    </ul>

    <h3>Improve Next</h3>

    <ul id="suggestions-list">
    </ul>

    <hr>

    <div class="stats-grid">

        <div class="stat-card">
            <h2 id="word-count">0</h2>
            <p>Words</p>
        </div>

        <div class="stat-card">
            <h2 id="heading-count">0</h2>
            <p>Headings</p>
        </div>

        <div class="stat-card">
            <h2 id="link-count">0</h2>
            <p>Links</p>
        </div>

        <div class="stat-card">
            <h2 id="code-block-count">0</h2>
            <p>Code Blocks</p>
        </div>

        <div class="stat-card">
            <h2 id="reading-time">0</h2>
            <p>Minutes</p>
        </div>

    </div>

</div>

    </div>

    <script src="app.js"></script>
    <script src="forge-rules.js"></script>
    <script src="markdown-forge.js"></script>

</body>

</html>
